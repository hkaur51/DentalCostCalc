<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dental Cost Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,300;6..72,400;6..72,500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#F5F0EB;color:#1a1a1a;font-family:'Newsreader',Georgia,serif;min-height:100vh;-webkit-font-smoothing:antialiased}
::selection{background:#EC489940;color:#3D1D5C}
.wrap{max-width:560px;margin:0 auto;padding:0 24px 80px}
.hero{padding:72px 24px 56px;max-width:560px;margin:0 auto}
.tag{font:500 11px/1 'IBM Plex Mono',monospace;letter-spacing:.18em;text-transform:uppercase;color:#7a6389}
h1{font-size:40px;font-weight:400;line-height:1.15;letter-spacing:-.5px;color:#3D1D5C;margin:0 0 16px}
.sub{font-size:16px;line-height:1.7;color:#5a4a5e;font-weight:400;max-width:420px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:48px}
.fl{display:block;font:500 11px/1 'IBM Plex Mono',monospace;letter-spacing:.12em;text-transform:uppercase;color:#6b5a78;margin-bottom:8px}
.fi{width:100%;padding:8px 0;background:transparent;border:none;border-bottom:2px solid #c4b5d0;color:#1a1a1a;font:400 16px 'Newsreader',Georgia,serif;outline:none;border-radius:0}
select.fi{appearance:auto}
input.fi{font-family:'IBM Plex Mono',monospace}
.sep{border-top:1px solid #ddd5cc}
.cat-btn{width:100%;display:flex;justify-content:space-between;align-items:center;padding:20px 0;background:none;border:none;cursor:pointer;font:500 17px 'Newsreader',Georgia,serif;color:#1a1a1a;text-align:left}
.cat-plus{font-size:20px;color:#9a8aaa;font-weight:400;transition:transform .2s}
.cat-plus.open{transform:rotate(45deg)}
.badge{font:500 10px 'IBM Plex Mono',monospace;background:#3D1D5C;color:#fff;border-radius:20px;padding:3px 9px;margin-left:10px}
.nc{font:500 11px 'IBM Plex Mono',monospace;color:#b91c1c;margin-left:10px}
.proc{display:flex;align-items:center;gap:16px;padding:13px 0;cursor:pointer;border-top:1px solid #e8e0d8}
.chk{width:18px;height:18px;border-radius:2px;border:2px solid #9a8aaa;background:transparent;flex-shrink:0;position:relative}
.chk.on{border:none;background:#3D1D5C}
.chk.on::after{content:'';position:absolute;left:4px;top:2px;width:5px;height:9px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg)}
.pname{flex:1;font-size:15px;color:#4a3a55}
.pname.on{color:#1a1a1a;font-weight:500}
.pprice{font:500 13px 'IBM Plex Mono',monospace;color:#7a6389;flex-shrink:0}
.qw{display:flex;align-items:center;gap:8px;margin-left:2px}
.qb{width:24px;height:24px;border-radius:50%;border:2px solid #9a8aaa;background:transparent;color:#3D1D5C;cursor:pointer;font:500 14px 'IBM Plex Mono',monospace;display:flex;align-items:center;justify-content:center}
.qv{font:500 14px 'IBM Plex Mono',monospace;min-width:14px;text-align:center;color:#1a1a1a}
.rrow{display:flex;justify-content:space-between;align-items:baseline;padding:12px 0;border-bottom:1px solid #e8e0d8}
.rproc{font-size:15px;flex:1;color:#1a1a1a;font-weight:400}
.rnums{font:500 14px 'IBM Plex Mono',monospace;text-align:right}
.strike{color:#9a8aaa;text-decoration:line-through;margin-right:12px}
.rpay{color:#3D1D5C;font-weight:600}
.rpf{color:#4a3a55;font-weight:500}
.totals{margin-top:48px;padding-top:28px;border-top:3px solid #3D1D5C}
.tline{display:flex;justify-content:space-between;margin-bottom:8px;font-size:14px}
.tlbl{color:#6b5a78;font-weight:500}
.tval{font:500 15px 'IBM Plex Mono',monospace;color:#6b5a78}
.tcov{color:#16763a}
.tfinal{display:flex;justify-content:space-between;align-items:baseline;margin-top:20px}
.tyou{font-size:18px;color:#3D1D5C;font-weight:500}
.tbig{font:400 38px 'IBM Plex Mono',monospace;letter-spacing:-1px;color:#c2185b}
.tpct{font:500 12px 'IBM Plex Mono',monospace;color:#7a6389;text-align:right;margin-top:6px}
.warn{font-size:14px;color:#b45309;margin-top:16px;font-style:italic;font-weight:500}
.tips{margin-top:56px;padding-top:24px;border-top:1px solid #ddd5cc}
.tips p{font-size:15px;color:#4a3a55;line-height:2;margin:0 0 4px}
.tips a{color:#3D1D5C;text-decoration-color:#9a8aaa;font-weight:500}
.empty{text-align:center;color:#9a8aaa;font-size:16px;padding:56px 0;font-style:italic}
.lbtn{background:none;border:none;color:#6b5a78;cursor:pointer;font:500 13px 'IBM Plex Mono',monospace;padding:0;text-decoration:underline;text-decoration-color:#c4b5d0;text-underline-offset:3px}
.lbtn:hover{color:#3D1D5C}
.mrow{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #e8e0d8;font-size:14px;color:#1a1a1a}
.mrow.cur{background:#e8ddf0;border-radius:2px;padding:8px 6px}
.mdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.mst{width:140px;flex-shrink:0}
.mti{font:500 12px 'IBM Plex Mono',monospace;color:#6b5a78;flex:1}
.mca{font:500 12px 'IBM Plex Mono',monospace;color:#7a6389}
.srcw{margin-top:16px;font:400 12px/2 'IBM Plex Mono',monospace;color:#6b5a78}
.srcw b{color:#3D1D5C}
.mcd-bar{margin-bottom:40px;padding-bottom:20px;border-bottom:1px solid #ddd5cc}
.footer{text-align:center;font:500 11px 'IBM Plex Mono',monospace;color:#9a8aaa;margin-top:64px;letter-spacing:.05em}
</style>
</head>
<body>
<div class="hero">
<p class="tag">dental cost estimator</p>
<h1>How much will your<br>dentist visit cost?</h1>
<p class="sub">Pick your state, insurance, and procedures.<br>Get a realistic range before you call.</p>
</div>
<div class="wrap" id="app"></div>
<script>
// --- DATA ---
var CATS = ["Preventive","Basic Restorative","Major Restorative","Endodontics","Periodontal","Prosthodontics","Cosmetic"];
var PROCS = [
  // Preventive 0-7
  ["Routine Cleaning (D1110)",100,135,200,67],
  ["Comprehensive Exam (D0150)",50,90,150,56],
  ["Periodic Exam (D0120)",30,55,90,32],
  ["Bitewing X-Rays (D0274)",40,70,120,24],
  ["Full Mouth X-Rays (D0210)",80,146,250,57],
  ["Panoramic X-Ray (D0330)",75,130,200,46],
  ["Fluoride Varnish (D1206)",20,40,70,26],
  ["Sealant per Tooth (D1351)",30,50,80,40],
  // Basic Restorative 8-13
  ["Filling, Composite 1 surface (D2391)",130,210,350,107],
  ["Filling, Composite 2 surface (D2392)",160,275,420,138],
  ["Filling, Composite 3 surface (D2393)",190,330,500,173],
  ["Filling, Amalgam 1 surface (D2140)",100,170,280,74],
  ["Simple Extraction (D7140)",150,200,350,100],
  ["Surgical Extraction (D7210)",200,350,550,175],
  // Major Restorative 14-16
  ["Crown, Porcelain (D2740)",800,1288,1800,394],
  ["Crown, Porcelain Fused Metal (D2750)",800,1200,1700,492],
  ["Core Buildup (D2950)",150,300,500,85],
  // Endodontics 17-19
  ["Root Canal, Anterior (D3310)",700,900,1200,550],
  ["Root Canal, Premolar (D3320)",800,1050,1400,650],
  ["Root Canal, Molar (D3330)",1000,1350,1800,748],
  // Periodontal 20-21
  ["Scaling and Root Planing per quad (D4341)",169,275,400,130],
  ["Perio Maintenance (D4910)",100,175,280,90],
  // Prosthodontics 22-25
  ["Complete Denture, Upper (D5110)",1000,1800,3000,575],
  ["Complete Denture, Lower (D5120)",1000,1800,3000,575],
  ["Bridge, 3 unit (D6750x3)",2400,3600,5500,1200],
  ["Single Implant Post (D6010)",1500,3000,5000,-1],
  // Cosmetic 26-27
  ["In-office Whitening (D9972)",300,550,900,-1],
  ["Porcelain Veneer (D2962)",800,1500,2500,114]
];
var CAT_RANGES = [[0,7],[8,13],[14,16],[17,19],[20,21],[22,25],[26,27]];
var TIERS = ["preventive","basic","major","basic","basic","major","cosmetic"];
var INS_KEYS = ["No insurance","PPO","PPO Enhanced","HMO","Medicaid","Discount plan"];
var INS_RATES = {
  "No insurance":[0,0,0,0],"PPO":[1,.8,.5,0],"PPO Enhanced":[1,.8,.6,0],
  "HMO":[1,.7,.5,0],"Medicaid":[1,1,1,0],"Discount plan":[.25,.2,.15,.1]
};
var INS_HAS_MAX = {"PPO":1,"PPO Enhanced":1};
var INS_DEF_MAX = {"PPO":1500,"PPO Enhanced":2500};
var TIER_IDX = {preventive:0,basic:1,major:2,cosmetic:3};

var MS = {"Alabama":["eo",0,"Emergency only"],"Alaska":["ext",0,"Covers most"],"Arizona":["comp",1000,"$1K cap"],"Arkansas":["ext",500,"$500 cap"],"California":["comp",0,"Full, no cap"],"Colorado":["comp",1500,"$1.5K cap"],"Connecticut":["comp",0,"No cap"],"Delaware":["eo",0,"Emergency only"],"District of Columbia":["comp",0,"Full"],"Florida":["lim",0,"Limited"],"Georgia":["eo",0,"Emergency only"],"Hawaii":["comp",0,"Full"],"Idaho":["ext",1000,"$1K cap"],"Illinois":["comp",0,"Full"],"Indiana":["comp",0,"HIP Plus"],"Iowa":["ext",1000,"$1K cap"],"Kansas":["lim",0,"Very limited"],"Kentucky":["comp",2000,"$2K cap"],"Louisiana":["ext",0,"Most services"],"Maine":["comp",0,"Full"],"Maryland":["comp",0,"Healthy Smiles"],"Massachusetts":["comp",0,"MassHealth"],"Michigan":["comp",0,"Full"],"Minnesota":["comp",0,"Full"],"Mississippi":["eo",0,"Emergency only"],"Missouri":["ext",0,"Most services"],"Montana":["comp",0,"Full"],"Nebraska":["ext",749,"$749 cap"],"Nevada":["lim",0,"Limited"],"New Hampshire":["ext",1500,"$1.5K cap"],"New Jersey":["comp",0,"Full"],"New Mexico":["comp",0,"Full"],"New York":["comp",0,"Full"],"North Carolina":["lim",0,"Limited"],"North Dakota":["comp",0,"Full"],"Ohio":["comp",0,"Full"],"Oklahoma":["ext",1000,"$1K cap"],"Oregon":["comp",0,"Full"],"Pennsylvania":["comp",0,"Full"],"Rhode Island":["comp",0,"Full"],"South Carolina":["lim",0,"Limited"],"South Dakota":["lim",1000,"$1K cap"],"Tennessee":["eo",0,"Emergency only"],"Texas":["eo",0,"Emergency only"],"Utah":["comp",0,"Expanded 2025"],"Vermont":["comp",0,"Full"],"Virginia":["comp",0,"Full"],"Washington":["comp",0,"Apple Health"],"West Virginia":["comp",2000,"$2K cap"],"Wisconsin":["comp",0,"Full"],"Wyoming":["lim",0,"Limited"]};
var MC = {"comp":[1,1,1,1,1,1,0],"ext":[1,1,1,1,1,0,0],"lim":[1,1,0,0,0,0,0],"eo":[0,0,0,0,0,0,0]};
var SM = {"Alabama":.82,"Alaska":1.35,"Arizona":.95,"Arkansas":.80,"California":1.25,"Colorado":1.05,"Connecticut":1.25,"Delaware":1.05,"District of Columbia":1.30,"Florida":1.00,"Georgia":.92,"Hawaii":1.30,"Idaho":.90,"Illinois":1.10,"Indiana":.90,"Iowa":.88,"Kansas":.88,"Kentucky":.85,"Louisiana":.85,"Maine":1.00,"Maryland":1.15,"Massachusetts":1.30,"Michigan":.95,"Minnesota":1.05,"Mississippi":.78,"Missouri":.90,"Montana":.92,"Nebraska":.88,"Nevada":1.05,"New Hampshire":1.10,"New Jersey":1.25,"New Mexico":.88,"New York":1.30,"North Carolina":.95,"North Dakota":.90,"Ohio":.92,"Oklahoma":.85,"Oregon":1.10,"Pennsylvania":1.05,"Rhode Island":1.15,"South Carolina":.88,"South Dakota":.88,"Tennessee":.85,"Texas":.95,"Utah":.95,"Vermont":1.05,"Virginia":1.05,"Washington":1.15,"West Virginia":.80,"Wisconsin":.95,"Wyoming":.92};
var TL = {"comp":"Comprehensive","ext":"Extensive","lim":"Limited","eo":"Emergency only"};
var TC = {"comp":"#2d8a4e","ext":"#a68307","lim":"#c2710c","eo":"#c2340a"};
var STATES = Object.keys(SM).sort();

// --- STATE ---
var st = "Texas";
var ins = "No insurance";
var aMax = 1500;
var ded = 50;
var sel = {}; // key=proc index, val=qty
var openCat = -1;
var showSrc = false;
var showMap = false;

function catOfProc(pi) {
  for (var c = 0; c < CAT_RANGES.length; c++) {
    if (pi >= CAT_RANGES[c][0] && pi <= CAT_RANGES[c][1]) return c;
  }
  return 0;
}

function esc(s) {
  var d = document.createElement('span');
  d.textContent = s;
  return d.innerHTML;
}

function render() {
  var plan = INS_RATES[ins];
  var mcd = (ins === "Medicaid") ? MS[st] : null;
  var mult = SM[st] || 1;
  var el = document.getElementById('app');
  var h = '';

  // controls
  h += '<div class="grid2"><div><label class="fl">State</label><select class="fi" id="ss">';
  for (var i = 0; i < STATES.length; i++) {
    h += '<option' + (STATES[i] === st ? ' selected' : '') + '>' + esc(STATES[i]) + '</option>';
  }
  h += '</select></div><div><label class="fl">Insurance</label><select class="fi" id="si">';
  for (var i = 0; i < INS_KEYS.length; i++) {
    h += '<option' + (INS_KEYS[i] === ins ? ' selected' : '') + '>' + esc(INS_KEYS[i]) + '</option>';
  }
  h += '</select></div></div>';

  // medicaid bar
  if (mcd) {
    h += '<div class="mcd-bar"><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:' + TC[mcd[0]] + ';margin-right:10px;vertical-align:middle"></span>';
    h += '<span style="font:400 14px \'IBM Plex Mono\',monospace;color:#3D1D5C">' + TL[mcd[0]] + '</span>';
    h += '<span style="font-size:13px;color:#b8a9c4;margin-left:8px">&mdash; ' + esc(mcd[2]) + '</span>';
    if (mcd[0] === "eo") h += '<div style="font-size:13px;color:#c2340a;margin-top:10px;font-style:italic">Only emergency extractions covered in ' + esc(st) + '.</div>';
    h += '</div>';
  }

  // PPO fields
  if (INS_HAS_MAX[ins]) {
    h += '<div class="grid2"><div><label class="fl">Annual max ($)</label><input class="fi" type="number" id="im" value="' + aMax + '"></div>';
    h += '<div><label class="fl">Deductible ($)</label><input class="fi" type="number" id="id" value="' + ded + '"></div></div>';
  }

  // procedures
  h += '<p class="tag" style="margin-bottom:24px">procedures</p>';
  for (var c = 0; c < CATS.length; c++) {
    var isO = (openCat === c);
    var isMcd = !!(ins === "Medicaid" && mcd);
    var catOk = isMcd ? MC[mcd[0]][c] : 1;
    var cnt = 0;
    for (var pi = CAT_RANGES[c][0]; pi <= CAT_RANGES[c][1]; pi++) {
      if (sel[pi]) cnt++;
    }

    h += '<div class="sep"><button class="cat-btn" data-cat="' + c + '">';
    h += '<span>' + esc(CATS[c]);
    if (cnt) h += '<span class="badge">' + cnt + '</span>';
    if (isMcd && !catOk) h += '<span class="nc">not covered</span>';
    h += '</span><span class="cat-plus' + (isO ? ' open' : '') + '">+</span></button>';

    if (isO) {
      h += '<div style="padding-bottom:20px">';
      for (var pi = CAT_RANGES[c][0]; pi <= CAT_RANGES[c][1]; pi++) {
        var p = PROCS[pi];
        var on = !!sel[pi];
        var adj = Math.round(p[2] * mult);
        h += '<div class="proc" data-pi="' + pi + '">';
        h += '<div class="chk' + (on ? ' on' : '') + '" data-chk="' + pi + '"></div>';
        h += '<span class="pname' + (on ? ' on' : '') + '">' + esc(p[0]) + '</span>';
        h += '<span class="pprice">$' + adj + '</span>';
        if (on) {
          h += '<div class="qw"><button class="qb" data-qd="' + pi + '">&#8722;</button>';
          h += '<span class="qv">' + sel[pi] + '</span>';
          h += '<button class="qb" data-qu="' + pi + '">+</button></div>';
        }
        h += '</div>';
      }
      h += '</div>';
    }
    h += '</div>';
  }
  h += '<div class="sep"></div>';

  // compute results
  var items = [];
  var pis = Object.keys(sel);
  for (var i = 0; i < pis.length; i++) {
    var pi = parseInt(pis[i]);
    var p = PROCS[pi];
    var ci = catOfProc(pi);
    var qty = sel[pi];
    var mid = Math.round(p[2] * mult * qty);
    var cov = 0, pay = mid;
    if (ins === "Medicaid" && mcd) {
      if (MC[mcd[0]][ci] && p[4] > 0) { cov = Math.round(p[4] * qty); pay = 0; }
    } else {
      var ti = TIER_IDX[TIERS[ci]];
      var r = plan[ti] || 0;
      cov = Math.round(mid * r);
      pay = mid - cov;
    }
    items.push([pi, ci, p[0], qty, mid, cov, pay]);
  }

  var tR = 0, tC = 0, tP = 0;
  for (var i = 0; i < items.length; i++) { tR += items[i][4]; tC += items[i][5]; tP += items[i][6]; }
  if (INS_HAS_MAX[ins]) { tP += ded; tC = Math.max(0, tC - ded); }
  var cap = INS_HAS_MAX[ins] ? aMax : (mcd && mcd[1] ? mcd[1] : 0);
  var warnMsg = '';
  if (cap && tC > cap) { var ov = tC - cap; tP += ov; tC = cap; warnMsg = 'Exceeds $' + cap.toLocaleString() + ' annual cap &mdash; +$' + ov.toLocaleString() + ' out of pocket.'; }

  if (items.length > 0) {
    h += '<div style="margin-top:56px"><p class="tag" style="margin-bottom:24px">your estimate</p>';
    for (var i = 0; i < items.length; i++) {
      var r = items[i];
      h += '<div class="rrow"><span class="rproc">' + esc(r[2]);
      if (r[3] > 1) h += '<span style="color:#d0c4d8;margin-left:6px;font-size:12px">&times;' + r[3] + '</span>';
      h += '</span><span class="rnums">';
      if (r[5] > 0) h += '<span class="strike">$' + r[4].toLocaleString() + '</span><span class="rpay">$' + r[6].toLocaleString() + '</span>';
      else h += '<span class="rpf">$' + r[6].toLocaleString() + '</span>';
      h += '</span></div>';
    }
    if (warnMsg) h += '<div class="warn">' + warnMsg + '</div>';

    h += '<div class="totals"><div class="tline"><span class="tlbl">Retail</span><span class="tval">$' + tR.toLocaleString() + '</span></div>';
    if (tC > 0) h += '<div class="tline"><span class="tlbl tcov">Covered</span><span class="tval tcov">&minus;$' + tC.toLocaleString() + '</span></div>';
    h += '<div class="tfinal"><span class="tyou">You pay</span><span class="tbig">$' + tP.toLocaleString() + '</span></div>';
    if (tR > 0 && tC > 0) h += '<div class="tpct">saving ' + Math.round(tC / tR * 100) + '%</div>';
    h += '</div>';

    // tips
    h += '<div class="tips"><p class="tag" style="margin-bottom:10px">worth knowing</p>';
    if (ins === "No insurance") {
      h += '<p>Most offices offer 5&ndash;20% off for cash upfront.</p>';
      h += '<p>Dental schools charge 30&ndash;60% less, supervised by faculty.</p>';
      h += '<p>FQHCs use sliding fees &mdash; <a href="https://findahealthcenter.hrsa.gov" target="_blank">find one</a>.</p>';
    }
    if (mcd && mcd[0] === "eo") h += '<p>' + esc(st) + ' only covers emergencies. Try dental schools or community health centers.</p>';
    var hasMaj = false, hasPros = false, hasCos = false;
    for (var i = 0; i < items.length; i++) {
      if (items[i][1] === 2) hasMaj = true;
      if (items[i][1] === 5) hasPros = true;
      if (items[i][1] === 6) hasCos = true;
    }
    if (hasMaj) h += '<p>Crown tip &mdash; schedule prep in December, seating in January to split benefit years.</p>';
    if (hasPros) h += '<p>Implants are rarely covered. Consider HSA/FSA or financing.</p>';
    if (hasCos) h += '<p>Cosmetic procedures are almost never covered.</p>';
    h += '<p>These are estimates. Always confirm with your provider.</p></div>';
    h += '</div>';
  } else {
    h += '<p class="empty">Select procedures above to see your estimate.</p>';
  }

  // medicaid map
  if (ins === "Medicaid") {
    h += '<div style="margin-top:48px"><button class="lbtn" id="mapbtn">' + (showMap ? 'hide' : 'view') + ' all 50 states &rarr;</button>';
    if (showMap) {
      h += '<div style="margin-top:16px;max-height:340px;overflow-y:auto">';
      var skeys = Object.keys(MS).sort();
      for (var i = 0; i < skeys.length; i++) {
        var s = skeys[i], info = MS[s];
        h += '<div class="mrow' + (s === st ? ' cur' : '') + '"><span class="mdot" style="background:' + TC[info[0]] + '"></span>';
        h += '<span class="mst"' + (s === st ? ' style="font-weight:500"' : '') + '>' + esc(s) + '</span>';
        h += '<span class="mti">' + TL[info[0]] + '</span>';
        h += '<span class="mca">' + (info[1] ? '$' + info[1] : '&mdash;') + '</span></div>';
      }
      h += '</div>';
    }
    h += '</div>';
  }

  // sources
  h += '<div style="margin-top:56px;padding-top:24px;border-top:1px solid #e8e0d8">';
  h += '<button class="lbtn" id="srcbtn">' + (showSrc ? 'hide' : 'view') + ' data sources &rarr;</button>';
  if (showSrc) {
    h += '<div class="srcw">';
    h += '<p><b>Pricing</b> CareCredit/Synchrony 2024 (ASQ360&deg;) &middot; ADA Fee Survey &middot; Fair Health &middot; MD Medicaid 2025</p>';
    h += '<p><b>Medicaid</b> CareQuest 2025 &middot; MACPAC &middot; ADA state schedules (Sep 2025)</p>';
    h += '<p><b>Geographic</b> NDAS multipliers &middot; Fair Health geozip</p>';
    h += '<p><b>Insurance</b> ADA/NADP benefit design surveys</p>';
    h += '<p style="margin-top:12px;font-style:italic">Estimates only. Not financial or medical advice.</p>';
    h += '</div>';
  }
  h += '</div>';

  h += '<p class="footer">dental cost estimator &middot; 2026</p>';

  el.innerHTML = h;

  // --- EVENT LISTENERS ---
  document.getElementById('ss').addEventListener('change', function(e) { st = e.target.value; render(); });
  document.getElementById('si').addEventListener('change', function(e) { ins = e.target.value; render(); });
  var imEl = document.getElementById('im');
  if (imEl) imEl.addEventListener('change', function(e) { aMax = parseInt(e.target.value) || 0; render(); });
  var idEl = document.getElementById('id');
  if (idEl) idEl.addEventListener('change', function(e) { ded = parseInt(e.target.value) || 0; render(); });
  var mbEl = document.getElementById('mapbtn');
  if (mbEl) mbEl.addEventListener('click', function() { showMap = !showMap; render(); });
  var sbEl = document.getElementById('srcbtn');
  if (sbEl) sbEl.addEventListener('click', function() { showSrc = !showSrc; render(); });

  // category buttons
  var catBtns = document.querySelectorAll('[data-cat]');
  for (var i = 0; i < catBtns.length; i++) {
    catBtns[i].addEventListener('click', function() {
      var c = parseInt(this.getAttribute('data-cat'));
      openCat = (openCat === c) ? -1 : c;
      render();
    });
  }

  // checkboxes and proc rows
  var chks = document.querySelectorAll('[data-chk]');
  for (var i = 0; i < chks.length; i++) {
    chks[i].addEventListener('click', function(e) {
      e.stopPropagation();
      var pi = parseInt(this.getAttribute('data-chk'));
      if (sel[pi]) delete sel[pi]; else sel[pi] = 1;
      render();
    });
  }
  var rows = document.querySelectorAll('[data-pi]');
  for (var i = 0; i < rows.length; i++) {
    rows[i].addEventListener('click', function() {
      var pi = parseInt(this.getAttribute('data-pi'));
      if (!sel[pi]) { sel[pi] = 1; render(); }
    });
  }

  // qty buttons
  var qds = document.querySelectorAll('[data-qd]');
  for (var i = 0; i < qds.length; i++) {
    qds[i].addEventListener('click', function(e) {
      e.stopPropagation();
      var pi = parseInt(this.getAttribute('data-qd'));
      if (sel[pi] && sel[pi] > 1) { sel[pi]--; render(); }
    });
  }
  var qus = document.querySelectorAll('[data-qu]');
  for (var i = 0; i < qus.length; i++) {
    qus[i].addEventListener('click', function(e) {
      e.stopPropagation();
      var pi = parseInt(this.getAttribute('data-qu'));
      if (sel[pi] && sel[pi] < 10) { sel[pi]++; render(); }
    });
  }
}

render();
</script>
</body>
</html>
